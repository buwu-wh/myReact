# 文件名: .github/workflows/ci.yml
# 这是触发流水线的核心配置示例

name: CI Pipeline # 工作流的名称

# 关键权限配置：让 Actions 有权限写入 Pages
permissions:
  contents: read
  pages: write
  id-token: write

# 确保只有一个部署任务在运行
concurrency:
  group: 'pages'
  cancel-in-progress: false

env:
  BUILD_SH_PATH: './scripts/build.sh' # 构建脚本路径

# 1. 核心触发条件：监听推送到 main 分支的事件
on:
  pull_request:
    branches: ['main'] # 只有当代码被推送到 main 分支时，才触发下面的任务

  # 手动触发
  workflow_dispatch:
    inputs:
      sit_env:
        description: 'sit环境'
        type: boolean
        default: false
      prod_env:
        description: 'prod环境'
        type: boolean
        default: false

# 2. 定义要执行的任务
jobs:
  test-and-build: # 任务的ID
    runs-on: ubuntu-latest # 任务运行的虚拟机环境
    steps:
      # 第一步：将你的代码签出到该虚拟机上
      - uses: actions/checkout@v4

      # 第二步：以 Node.js 项目为例，安装依赖并运行测试
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: 执行校验及构建脚本
        run: |
          chmod +x ${{ env.BUILD_SH_PATH }}
          ${{ env.BUILD_SH_PATH }} ${{ github.event.inputs.sit_env || false }}

      - name: 处理 SPA 路由
        if: github.event.inputs.sit_env == true
        run: cp dist/index.html dist/404.html

      - name: 上传 Pages 产物
        if: github.event.inputs.sit_env == true
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist' # 这里替换成你的实际构建输出目录，React 通常是 build，Vue/Angular 通常是 dist

      # 关键步骤2：触发部署
      - name: 部署到 GitHub Pages
        if: github.event.inputs.sit_env == true
        id: deployment
        uses: actions/deploy-pages@v4
